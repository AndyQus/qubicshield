<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="inner-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" rx="32" fill="url(#bg-grad)"/>

  <!-- Shield shape -->
  <path d="M120 28 L178 52 L178 116 Q178 162 120 192 Q62 162 62 116 L62 52 Z"
        fill="url(#shield-grad)" opacity="0.15"/>
  <path d="M120 28 L178 52 L178 116 Q178 162 120 192 Q62 162 62 116 L62 52 Z"
        fill="none" stroke="url(#shield-grad)" stroke-width="3" filter="url(#glow)"/>

  <!-- Inner shield highlight -->
  <path d="M120 42 L166 62 L166 116 Q166 152 120 178 Q74 152 74 116 L74 62 Z"
        fill="url(#inner-grad)" stroke="url(#shield-grad)" stroke-width="1" opacity="0.4"/>

  <!-- Qubic symbol — centered in shield (scale 1.4, origin 98/72) -->
  <g transform="translate(98, 72) scale(1.4)" filter="url(#glow)">
    <path fill="#23FFFF" d="M11.308 0H1.615C.723 0 0 .724 0 1.616v35.538c0 .892.723 1.616 1.615 1.616h9.693c.892 0 1.615-.724 1.615-1.616V1.616C12.923.724 12.2 0 11.308 0Z"/>
    <path fill="#23FFFF" d="M28.538 0h-9.692c-.892 0-1.616.723-1.616 1.615v48.462c0 .892.724 1.615 1.616 1.615h9.692c.892 0 1.616-.723 1.616-1.615V1.615C30.154.723 29.43 0 28.538 0Z"/>
  </g>

</svg>
